<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>우리 동네 아파트 실거래가 대시보드</title>

  <!-- Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- PapaParse (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root { --bg:#0b1020; --card:#121a33; --text:#e8ecff; --muted:#a9b2d3; --line:#2a3563; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 22px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 16px; }
    h1 { margin:0; font-size: 22px; }
    .sub { margin-top:6px; color: var(--muted); font-size: 13px; line-height: 1.4; }
    .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap: 12px; margin-top: 14px; }
    .card { background: var(--card); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 14px; }
    .kpi { display:flex; flex-direction: column; gap: 6px; }
    .kpi .label { color: var(--muted); font-size: 12px; }
    .kpi .value { font-size: 22px; font-weight: 700; }
    .row { display:flex; gap:10px; flex-wrap: wrap; align-items: center; }
    .input, select {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.10);
      color: var(--text); border-radius: 10px; padding: 10px 10px; outline: none;
    }
    .btn {
      background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.14);
      color: var(--text); border-radius: 10px; padding: 10px 12px; cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,.14); }
    .muted { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.08); font-size: 13px; }
    th { text-align:left; color: var(--muted); font-weight: 600; }
    td.num { text-align:right; font-variant-numeric: tabular-nums; }
    .status { font-size: 13px; color: var(--muted); }
    canvas { max-height: 360px; }
    .right { text-align:right; }
    .small { font-size: 12px; }
    @media (max-width: 980px){
      .grid { grid-template-columns: repeat(1, 1fr); }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <h1>우리 동네 아파트 실거래가 대시보드</h1>
      <div class="sub">
        데이터: Google Sheets “웹에 게시” CSV<br/>
        <span class="muted small" id="dataUrlText"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <!-- Controls -->
    <div class="card">
      <div class="row">
        <span class="status" id="status">데이터 로딩 준비...</span>
        <span class="muted">|</span>

        <label class="muted small">아파트명</label>
        <select id="aptFilter"></select>

        <label class="muted small">법정동</label>
        <select id="dongFilter"></select>

        <label class="muted small">검색</label>
        <input id="q" class="input" placeholder="아파트명/법정동 검색" />

        <button class="btn" id="resetBtn">필터 초기화</button>
      </div>
      <div class="sub small muted" style="margin-top:10px;">
        팁: 필터를 걸면 KPI/차트/테이블이 모두 같이 갱신됩니다.
      </div>
    </div>

    <div class="grid">
      <!-- KPIs -->
      <div class="card" style="grid-column: span 3;">
        <div class="kpi">
          <div class="label">전체 거래 건수</div>
          <div class="value" id="kpiCount">-</div>
        </div>
      </div>
      <div class="card" style="grid-column: span 3;">
        <div class="kpi">
          <div class="label">평균 거래가격 (만원)</div>
          <div class="value" id="kpiAvg">-</div>
        </div>
      </div>
      <div class="card" style="grid-column: span 3;">
        <div class="kpi">
          <div class="label">최고 거래가격 (만원)</div>
          <div class="value" id="kpiMax">-</div>
        </div>
      </div>
      <div class="card" style="grid-column: span 3;">
        <div class="kpi">
          <div class="label">최저 거래가격 (만원)</div>
          <div class="value" id="kpiMin">-</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card" style="grid-column: span 12;">
        <div class="row" style="justify-content: space-between;">
          <div>
            <div style="font-weight:700;">월별 평균 거래가격</div>
            <div class="muted small" id="chartNote">-</div>
          </div>
          <div class="muted small right" id="lastUpdated"></div>
        </div>
        <div style="height: 380px; margin-top: 8px;">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- Table -->
      <div class="card" style="grid-column: span 12;">
        <div class="row" style="justify-content: space-between;">
          <div>
            <div style="font-weight:700;">거래 목록</div>
            <div class="muted small" id="tableNote">-</div>
          </div>
          <div class="row">
            <label class="muted small">정렬</label>
            <select id="sortBy">
              <option value="date_desc">거래일자 (최신순)</option>
              <option value="date_asc">거래일자 (오래된순)</option>
              <option value="price_desc">거래금액 (높은순)</option>
              <option value="price_asc">거래금액 (낮은순)</option>
              <option value="area_desc">전용면적 (큰순)</option>
              <option value="area_asc">전용면적 (작은순)</option>
            </select>
            <label class="muted small">표시</label>
            <select id="pageSize">
              <option>20</option>
              <option>50</option>
              <option>100</option>
              <option value="999999">전체</option>
            </select>
          </div>
        </div>

        <div style="overflow:auto; margin-top:10px;">
          <table>
            <thead>
              <tr>
                <th>거래일자</th>
                <th>아파트명</th>
                <th>법정동</th>
                <th class="right">전용면적(㎡)</th>
                <th class="right">층</th>
                <th class="right">거래금액(만원)</th>
                <th class="right">건축년도</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="row" style="justify-content: space-between; margin-top: 10px;">
          <div class="muted small" id="pagingInfo">-</div>
          <div class="row">
            <button class="btn" id="prevBtn">이전</button>
            <button class="btn" id="nextBtn">다음</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // ====== 설정: 사용자가 제공한 CSV URL ======
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuzgquQ9j2JdsyGsX4wJtQQ7iiubGCqhfH2dkNZa6ouU6Uj6H3kPt0_X7ddgw1jRXrUZ51Fz0YbE6F/pub?gid=851889144&single=true&output=csv";

    // ====== 상태 ======
    let rawRows = [];
    let filteredRows = [];
    let chart;

    let page = 1;

    // ====== 유틸 ======
    const $ = (id) => document.getElementById(id);

    function fmtNumber(n){
      if (!isFinite(n)) return "-";
      return new Intl.NumberFormat("ko-KR").format(Math.round(n));
    }

    // "12,345" / "12,345만원" / "12345" / "12345.0" 같은 입력을 숫자로
    function parseNumber(v){
      if (v === null || v === undefined) return NaN;
      const s = String(v).replace(/[^\d.-]/g, ""); // 숫자/부호/소수점만
      const n = Number(s);
      return isFinite(n) ? n : NaN;
    }

    // 날짜: "20260115" / "2026-01-15" / "2026.01.15" 등 대응
    function parseDate(v){
      if (!v) return null;
      const s = String(v).trim();
      // yyyymmdd
      if (/^\d{8}$/.test(s)) {
        const y = Number(s.slice(0,4));
        const m = Number(s.slice(4,6)) - 1;
        const d = Number(s.slice(6,8));
        const dt = new Date(y, m, d);
        return isNaN(dt.getTime()) ? null : dt;
      }
      // yyyy-mm-dd or yyyy.mm.dd
      const t = s.replace(/\./g,'-');
      const dt = new Date(t);
      return isNaN(dt.getTime()) ? null : dt;
    }

    function toMonthKey(dt){
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,'0');
      return `${y}-${m}`;
    }

    function safeText(v){
      return (v ?? "").toString().replace(/[<>&"]/g, (c) => ({
        "<":"&lt;", ">":"&gt;", "&":"&amp;", "\"":"&quot;"
      }[c]));
    }

    function normalizeRow(r){
      // 헤더명이 약간 달라도 최대한 매핑
      const get = (...keys) => {
        for (const k of keys){
          if (r[k] !== undefined) return r[k];
        }
        return "";
      };

      const dateRaw = get("거래일자", "거래일", "계약일", "계약일자");
      const apt = get("아파트명", "단지명", "아파트", "단지");
      const dong = get("법정동", "동", "법정동명", "법정동주소");
      const areaRaw = get("전용면적(㎡)", "전용면적", "전용면적(㎡)", "전용면적(제곱미터)");
      const floorRaw = get("층", "해당층");
      const priceRaw = get("거래금액(만원)", "거래금액", "거래가격", "거래금액(만원)");
      const builtRaw = get("건축년도", "건축년", "준공년도");

      const dt = parseDate(dateRaw);
      const price = parseNumber(priceRaw);
      const area = parseNumber(areaRaw);
      const floor = parseNumber(floorRaw);
      const built = parseNumber(builtRaw);

      return {
        거래일자_raw: dateRaw,
        거래일자: dt,
        아파트명: (apt ?? "").toString().trim(),
        법정동: (dong ?? "").toString().trim(),
        전용면적: area,
        층: floor,
        거래금액: price,
        건축년도: built
      };
    }

    // ====== 로딩 ======
    function setStatus(msg){ $("status").textContent = msg; }

    function loadCSV(){
      $("dataUrlText").textContent = CSV_URL;

      setStatus("CSV 불러오는 중...");
      Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: (res) => {
          try{
            const rows = (res.data || []).map(normalizeRow)
              // 최소 조건: 날짜/가격이 있어야 차트/요약에 의미가 있음
              .filter(x => x.거래일자 && isFinite(x.거래금액));

            rawRows = rows;

            if (!rawRows.length){
              setStatus("데이터가 비어있거나(또는 헤더/형식이 달라) 처리할 수 없어요. 시트 헤더를 확인해주세요.");
              renderEmpty();
              return;
            }

            setStatus(`로딩 완료: ${rawRows.length}건`);
            $("lastUpdated").textContent = `마지막 갱신: ${new Date().toLocaleString("ko-KR")}`;

            initFilters();
            applyFiltersAndRender();
          } catch(e){
            console.error(e);
            setStatus("처리 중 오류가 발생했어요. (콘솔 확인)");
          }
        },
        error: (err) => {
          console.error(err);
          setStatus("CSV 다운로드에 실패했어요. URL이 공개(웹에 게시) 상태인지 확인해주세요.");
        }
      });
    }

    function renderEmpty(){
      $("kpiCount").textContent = "-";
      $("kpiAvg").textContent = "-";
      $("kpiMax").textContent = "-";
      $("kpiMin").textContent = "-";
      $("tbody").innerHTML = "";
      if (chart) chart.destroy();
    }

    // ====== 필터 UI ======
    function uniqueSorted(arr){
      return Array.from(new Set(arr.filter(Boolean))).sort((a,b)=>a.localeCompare(b, "ko"));
    }

    function initFilters(){
      // 아파트명/법정동 옵션 만들기
      const apts = uniqueSorted(rawRows.map(r => r.아파트명));
      const dongs = uniqueSorted(rawRows.map(r => r.법정동));

      const aptSel = $("aptFilter");
      const dongSel = $("dongFilter");

      aptSel.innerHTML = `<option value="">(전체)</option>` + apts.map(a => `<option value="${safeText(a)}">${safeText(a)}</option>`).join("");
      dongSel.innerHTML = `<option value="">(전체)</option>` + dongs.map(d => `<option value="${safeText(d)}">${safeText(d)}</option>`).join("");

      // 이벤트
      aptSel.onchange = () => { page = 1; applyFiltersAndRender(); };
      dongSel.onchange = () => { page = 1; applyFiltersAndRender(); };
      $("q").oninput = () => { page = 1; applyFiltersAndRender(); };

      $("sortBy").onchange = () => { page = 1; renderTable(); };
      $("pageSize").onchange = () => { page = 1; renderTable(); };

      $("resetBtn").onclick = () => {
        aptSel.value = "";
        dongSel.value = "";
        $("q").value = "";
        $("sortBy").value = "date_desc";
        $("pageSize").value = "20";
        page = 1;
        applyFiltersAndRender();
      };

      $("prevBtn").onclick = () => { if (page > 1) { page--; renderTable(); } };
      $("nextBtn").onclick = () => {
        const size = Number($("pageSize").value);
        const total = filteredRows.length;
        const maxPage = (size >= 999999) ? 1 : Math.max(1, Math.ceil(total / size));
        if (page < maxPage) { page++; renderTable(); }
      };
    }

    function applyFiltersAndRender(){
      const apt = $("aptFilter").value.trim();
      const dong = $("dongFilter").value.trim();
      const q = $("q").value.trim().toLowerCase();

      filteredRows = rawRows.filter(r => {
        if (apt && r.아파트명 !== apt) return false;
        if (dong && r.법정동 !== dong) return false;
        if (q){
          const hay = `${r.아파트명} ${r.법정동}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      renderKPIs();
      renderChart();
      renderTable();

      $("chartNote").textContent = `현재 필터 기준 ${filteredRows.length}건`;
      $("tableNote").textContent = `현재 필터 기준 ${filteredRows.length}건`;
    }

    // ====== KPI ======
    function renderKPIs(){
      const n = filteredRows.length;
      $("kpiCount").textContent = fmtNumber(n);

      if (!n){
        $("kpiAvg").textContent = "-";
        $("kpiMax").textContent = "-";
        $("kpiMin").textContent = "-";
        return;
      }

      const prices = filteredRows.map(r => r.거래금액).filter(v => isFinite(v));
      const sum = prices.reduce((a,b)=>a+b,0);
      const avg = sum / prices.length;
      const max = Math.max(...prices);
      const min = Math.min(...prices);

      $("kpiAvg").textContent = fmtNumber(avg);
      $("kpiMax").textContent = fmtNumber(max);
      $("kpiMin").textContent = fmtNumber(min);
    }

    // ====== 차트: 월별 평균 ======
    function renderChart(){
      const map = new Map(); // month -> {sum, cnt}
      for (const r of filteredRows){
        if (!r.거래일자 || !isFinite(r.거래금액)) continue;
        const key = toMonthKey(r.거래일자);
        if (!map.has(key)) map.set(key, {sum:0, cnt:0});
        const o = map.get(key);
        o.sum += r.거래금액;
        o.cnt += 1;
      }

      const labels = Array.from(map.keys()).sort(); // YYYY-MM 정렬
      const data = labels.map(k => {
        const o = map.get(k);
        return o.cnt ? (o.sum / o.cnt) : null;
      });

      const ctx = $("priceChart").getContext("2d");
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "월별 평균 거래가격(만원)",
            data,
            tension: 0.25,
            pointRadius: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#e8ecff" } },
            tooltip: {
              callbacks: {
                label: (ctx) => ` ${fmtNumber(ctx.parsed.y)} 만원`
              }
            }
          },
          scales: {
            x: {
              ticks: { color: "#a9b2d3" },
              grid: { color: "rgba(255,255,255,.06)" }
            },
            y: {
              ticks: {
                color: "#a9b2d3",
                callback: (v) => fmtNumber(v)
              },
              grid: { color: "rgba(255,255,255,.06)" }
            }
          }
        }
      });
    }

    // ====== 테이블 ======
    function sortRows(rows){
      const mode = $("sortBy").value;

      const copy = rows.slice();
      const byDate = (a,b) => (a.거래일자?.getTime() ?? 0) - (b.거래일자?.getTime() ?? 0);
      const byPrice = (a,b) => (a.거래금액 ?? NaN) - (b.거래금액 ?? NaN);
      const byArea = (a,b) => (a.전용면적 ?? NaN) - (b.전용면적 ?? NaN);

      if (mode === "date_desc") copy.sort((a,b)=> -byDate(a,b));
      else if (mode === "date_asc") copy.sort((a,b)=> byDate(a,b));
      else if (mode === "price_desc") copy.sort((a,b)=> -byPrice(a,b));
      else if (mode === "price_asc") copy.sort((a,b)=> byPrice(a,b));
      else if (mode === "area_desc") copy.sort((a,b)=> -byArea(a,b));
      else if (mode === "area_asc") copy.sort((a,b)=> byArea(a,b));

      return copy;
    }

    function fmtDate(dt){
      if (!dt) return "";
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,'0');
      const d = String(dt.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }

    function renderTable(){
      const size = Number($("pageSize").value);
      const sorted = sortRows(filteredRows);

      const total = sorted.length;
      const maxPage = (size >= 999999) ? 1 : Math.max(1, Math.ceil(total / size));
      if (page > maxPage) page = maxPage;

      let start = 0, end = total;
      if (size < 999999){
        start = (page - 1) * size;
        end = Math.min(total, start + size);
      }
      const view = sorted.slice(start, end);

      $("pagingInfo").textContent = total
        ? `총 ${fmtNumber(total)}건 중 ${fmtNumber(start+1)}~${fmtNumber(end)} 표시 (페이지 ${page}/${maxPage})`
        : "표시할 거래가 없습니다.";

      const tbody = $("tbody");
      tbody.innerHTML = view.map(r => `
        <tr>
          <td>${safeText(fmtDate(r.거래일자))}</td>
          <td>${safeText(r.아파트명)}</td>
          <td>${safeText(r.법정동)}</td>
          <td class="num">${isFinite(r.전용면적) ? safeText(r.전용면적.toFixed(2)) : "-"}</td>
          <td class="num">${isFinite(r.층) ? safeText(String(Math.round(r.층))) : "-"}</td>
          <td class="num">${isFinite(r.거래금액) ? safeText(fmtNumber(r.거래금액)) : "-"}</td>
          <td class="num">${isFinite(r.건축년도) ? safeText(String(Math.round(r.건축년도))) : "-"}</td>
        </tr>
      `).join("");
    }

    // 시작
    loadCSV();
  </script>
</body>
</html>
