<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #e1e4e8;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 30px;
        }

        /* 요약 카드 스타일 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .summary-card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0;
        }

        /* 차트 및 테이블 컨테이너 */
        .section-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        /* 테이블 스타일 */
        .table-wrapper {
            overflow-x: auto;
            max-height: 500px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8f9fa;
            position: sticky;
            top: 0;
            z-index: 1;
            font-weight: 600;
            color: var(--text-main);
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* 로딩 화면 */
        #loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>우리 동네 아파트 실거래가 대시보드</h1>
    
    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div id="dashboard" style="display: none;">
        <div class="summary-grid">
            <div class="summary-card">
                <h3>전체 거래 건수</h3>
                <p class="value" id="total-count">-</p>
            </div>
            <div class="summary-card">
                <h3>평균 거래가격</h3>
                <p class="value" id="avg-price">-</p>
            </div>
            <div class="summary-card">
                <h3>최고 거래가격</h3>
                <p class="value" id="max-price">-</p>
            </div>
            <div class="summary-card">
                <h3>최저 거래가격</h3>
                <p class="value" id="min-price">-</p>
            </div>
        </div>

        <div class="section-container">
            <h2 class="section-title">월별 평균 거래가격 추이</h2>
            <canvas id="priceChart" height="80"></canvas>
        </div>

        <div class="section-container">
            <h2 class="section-title">상세 거래 내역</h2>
            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>거래일자</th>
                            <th>아파트명</th>
                            <th>법정동</th>
                            <th>전용면적(㎡)</th>
                            <th>층</th>
                            <th>거래금액(만원)</th>
                            <th>건축년도</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 구글 시트 CSV URL
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuzgquQ9j2JdsyGsX4wJtQQ7iiubGCqhfH2dkNZa6ouU6Uj6H3kPt0_X7ddgw1jRXrUZ51Fz0YbE6F/pub?gid=851889144&single=true&output=csv';

    // 데이터 로드 및 파싱 (PapaParse 활용)
    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            processData(data);
        },
        error: function(err) {
            document.getElementById('loading').innerText = '데이터를 불러오는 데 실패했습니다.';
            console.error('CSV Parsing Error:', err);
        }
    });

    function processData(data) {
        let totalCount = 0;
        let prices = [];
        let monthlyData = {};
        const tbody = document.querySelector('#dataTable tbody');

        // 데이터 순회하며 계산 및 테이블 행 생성
        data.forEach(row => {
            // 필수 필드 확인 (헤더 이름이 정확히 일치해야 함)
            const dateStr = row['거래일자'] || '';
            const priceStr = row['거래금액(만원)'] || '';
            
            // 거래금액 파싱 (쉼표 제거 후 숫자로 변환)
            const price = parseInt(String(priceStr).replace(/,/g, ''), 10);
            
            if (!isNaN(price) && dateStr) {
                totalCount++;
                prices.push(price);

                // 월별 데이터 집계를 위한 날짜 파싱 (예: 2023-10-05 -> 2023-10)
                // 숫자만 추출하여 YYYY-MM 형태 생성
                const cleanDate = dateStr.replace(/[^0-9]/g, '');
                if (cleanDate.length >= 6) {
                    const monthKey = cleanDate.substring(0, 4) + '-' + cleanDate.substring(4, 6);
                    if (!monthlyData[monthKey]) {
                        monthlyData[monthKey] = { sum: 0, count: 0 };
                    }
                    monthlyData[monthKey].sum += price;
                    monthlyData[monthKey].count++;
                }

                // 테이블 행(Row) 생성
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row['거래일자'] || '-'}</td>
                    <td>${row['아파트명'] || '-'}</td>
                    <td>${row['법정동'] || '-'}</td>
                    <td>${row['전용면적(㎡)'] || '-'}</td>
                    <td>${row['층'] || '-'}</td>
                    <td>${Number(price).toLocaleString()}</td>
                    <td>${row['건축년도'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            }
        });

        if (totalCount === 0) {
            alert("유효한 거래 데이터가 없습니다. CSV 헤더명을 확인해주세요.");
            return;
        }

        // 요약 수치 계산
        const avgPrice = Math.round(prices.reduce((a, b) => a + b, 0) / totalCount);
        const maxPrice = Math.max(...prices);
        const minPrice = Math.min(...prices);

        // 요약 수치 화면에 반영
        document.getElementById('total-count').innerText = `${totalCount.toLocaleString()}건`;
        document.getElementById('avg-price').innerText = `${avgPrice.toLocaleString()}만원`;
        document.getElementById('max-price').innerText = `${maxPrice.toLocaleString()}만원`;
        document.getElementById('min-price').innerText = `${minPrice.toLocaleString()}만원`;

        // 차트 그리기
        drawChart(monthlyData);
    }

    function drawChart(monthlyData) {
        // 날짜순(Key순)으로 정렬
        const labels = Object.keys(monthlyData).sort();
        // 월별 평균 계산
        const dataPoints = labels.map(label => {
            return Math.round(monthlyData[label].sum / monthlyData[label].count);
        });

        const ctx = document.getElementById('priceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '평균 거래금액(만원)',
                    data: dataPoints,
                    borderColor: '#4a90e2',
                    backgroundColor: 'rgba(74, 144, 226, 0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#4a90e2',
                    fill: true,
                    tension: 0.3 // 곡선 부드럽게
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y.toLocaleString() + '만원';
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        ticks: {
                            callback: function(value) {
                                return value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
