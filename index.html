<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>우리 동네 아파트 실거래가 대시보드</title>

  <!-- Chart.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- DataTables (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-dt@2.0.8/css/dataTables.dataTables.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.0.8/js/dataTables.min.js"></script>

  <style>
    :root{
      --bg:#0b0f14;
      --card:#111826;
      --text:#e6edf3;
      --muted:#9fb0c0;
      --border:#1e2a3b;
      --accent:#4ea1ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif;
      background:linear-gradient(180deg, #070a0f 0%, #0b0f14 100%);
      color:var(--text);
    }
    h1{margin:0 0 16px; font-size:22px; letter-spacing:-0.2px}
    .sub{color:var(--muted); margin-bottom:18px; font-size:13px}
    .grid{
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap:16px;
      align-items:start;
    }
    .card{
      background:rgba(17,24,38,0.9);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .kpis{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    .kpi{
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.03);
    }
    .kpi .label{color:var(--muted); font-size:12px; margin-bottom:6px}
    .kpi .value{font-size:20px; font-weight:700}
    .kpi .hint{color:var(--muted); font-size:12px; margin-top:6px}
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }
    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.03);
      padding:8px 10px;
      border-radius:999px;
      color:var(--muted);
      font-size:12px;
    }
    .pill input, .pill select{
      background:transparent;
      color:var(--text);
      border:none;
      outline:none;
      font-size:12px;
      min-width:120px;
    }
    .btn{
      cursor:pointer;
      border:1px solid var(--border);
      background:rgba(78,161,255,0.12);
      color:var(--text);
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
    }
    .btn:hover{border-color:rgba(78,161,255,0.5)}
    .table-wrap{margin-top:16px}
    table.dataTable{
      width:100% !important;
      color:var(--text);
      background:transparent;
      border-collapse:collapse;
    }
    /* DataTables dark-ish tweaks */
    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select{
      background:rgba(255,255,255,0.04) !important;
      border:1px solid var(--border) !important;
      color:var(--text) !important;
      border-radius:10px !important;
      padding:6px 10px !important;
      outline:none;
    }
    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_paginate{
      color:var(--muted) !important;
      margin-top:10px;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button{
      color:var(--muted) !important;
      border:1px solid var(--border) !important;
      background:rgba(255,255,255,0.03) !important;
      border-radius:10px !important;
      margin:0 2px !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current{
      color:var(--text) !important;
      border-color:rgba(78,161,255,0.5) !important;
      background:rgba(78,161,255,0.15) !important;
    }
    .muted{color:var(--muted)}
    .error{
      border:1px solid rgba(255,90,90,0.45);
      background: rgba(255,90,90,0.08);
      color:#ffd7d7;
      padding:12px;
      border-radius:12px;
      margin-top:12px;
      display:none;
      white-space:pre-wrap;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
      .kpis{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <h1>우리 동네 아파트 실거래가 대시보드</h1>
  <div class="sub">
    구글 시트 CSV에서 실거래 데이터를 불러와 월별 평균 거래가격, 요약 지표, 거래 목록을 표시합니다.
  </div>

  <div class="grid">
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
          <div style="font-weight:700; margin-bottom:4px;">월별 평균 거래가격(만원)</div>
          <div class="muted" style="font-size:12px;">거래일자 기준 월별 평균(필터 적용 결과)</div>
        </div>
        <div class="toolbar">
          <span class="pill">
            법정동
            <select id="dongSelect">
              <option value="">전체</option>
            </select>
          </span>
          <span class="pill">
            아파트명
            <input id="aptSearch" placeholder="예: 래미안" />
          </span>
          <button class="btn" id="resetBtn">필터 초기화</button>
        </div>
      </div>

      <div style="margin-top:10px;">
        <canvas id="monthlyChart" height="110"></canvas>
      </div>

      <div id="errorBox" class="error"></div>
    </div>

    <div class="card">
      <div style="font-weight:700; margin-bottom:10px;">요약</div>
      <div class="kpis">
        <div class="kpi">
          <div class="label">전체 거래 건수</div>
          <div class="value" id="cnt">-</div>
          <div class="hint" id="rangeHint">-</div>
        </div>
        <div class="kpi">
          <div class="label">평균 거래가격(만원)</div>
          <div class="value" id="avg">-</div>
          <div class="hint muted">필터 적용 기준</div>
        </div>
        <div class="kpi">
          <div class="label">최고 거래가격(만원)</div>
          <div class="value" id="max">-</div>
          <div class="hint" id="maxHint">-</div>
        </div>
        <div class="kpi">
          <div class="label">최저 거래가격(만원)</div>
          <div class="value" id="min">-</div>
          <div class="hint" id="minHint">-</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card table-wrap">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div style="font-weight:700;">거래 목록</div>
      <div class="muted" style="font-size:12px;">테이블 검색/정렬 가능</div>
    </div>

    <div style="margin-top:12px;">
      <table id="txTable" class="display" style="width:100%">
        <thead>
          <tr>
            <th>거래일자</th>
            <th>아파트명</th>
            <th>법정동</th>
            <th>전용면적(㎡)</th>
            <th>층</th>
            <th>거래금액(만원)</th>
            <th>건축년도</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
  // ====== 설정 ======
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuzgquQ9j2JdsyGsX4wJtQQ7iiubGCqhfH2dkNZa6ouU6Uj6H3kPt0_X7ddgw1jRXrUZ51Fz0YbE6F/pub?gid=851889144&single=true&output=csv";

  // ====== 유틸 ======
  function showError(msg){
    const box = document.getElementById("errorBox");
    box.style.display = "block";
    box.textContent = msg;
  }
  function hideError(){
    const box = document.getElementById("errorBox");
    box.style.display = "none";
    box.textContent = "";
  }

  function parseCSV(text){
    // 간단 CSV 파서(따옴표/콤마 처리)
    const rows = [];
    let row = [];
    let cur = "";
    let inQuotes = false;

    for (let i=0;i<text.length;i++){
      const ch = text[i];
      const next = text[i+1];

      if (ch === '"' ){
        if (inQuotes && next === '"'){ // escaped quote
          cur += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === ',' && !inQuotes){
        row.push(cur);
        cur = "";
      } else if ((ch === '\n' || ch === '\r') && !inQuotes){
        if (ch === '\r' && next === '\n') i++;
        row.push(cur);
        cur = "";
        if (row.length > 1 || (row.length === 1 && row[0].trim() !== "")){
          rows.push(row);
        }
        row = [];
      } else {
        cur += ch;
      }
    }
    // last cell
    if (cur.length || row.length){
      row.push(cur);
      rows.push(row);
    }
    return rows;
  }

  function toNumber(v){
    if (v == null) return NaN;
    const s = String(v).replace(/[^\d.-]/g, "");
    const n = Number(s);
    return Number.isFinite(n) ? n : NaN;
  }

  function parseDateYMD(s){
    // 거래일자 형태가 다양할 수 있어 방어적으로 처리
    // 1) YYYY-MM-DD / YYYY.MM.DD / YYYY/MM/DD
    // 2) YYYYMMDD
    const t = String(s || "").trim();
    if (!t) return null;

    // YYYYMMDD
    if (/^\d{8}$/.test(t)){
      const y = t.slice(0,4), m = t.slice(4,6), d = t.slice(6,8);
      return new Date(`${y}-${m}-${d}T00:00:00`);
    }
    // Replace . or / with -
    const norm = t.replace(/[./]/g, "-");
    const dt = new Date(norm.includes("T") ? norm : `${norm}T00:00:00`);
    return isNaN(dt.getTime()) ? null : dt;
  }

  function fmtMoneyKRWMan(n){
    if (!Number.isFinite(n)) return "-";
    return n.toLocaleString("ko-KR");
  }

  function fmtDate(dt){
    if (!dt) return "-";
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const d = String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }

  function monthKey(dt){
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    return `${y}-${m}`;
  }

  // ====== 상태 ======
  let raw = [];         // 전체 데이터(정제된 객체)
  let filtered = [];    // 필터 적용 데이터
  let dtTable = null;   // DataTable 인스턴스
  let chart = null;     // Chart.js 인스턴스

  // ====== 데이터 로딩 ======
  async function load(){
    hideError();
    try{
      const res = await fetch(CSV_URL, {cache:"no-store"});
      if (!res.ok) throw new Error(`CSV 로딩 실패: HTTP ${res.status}`);
      const text = await res.text();
      const rows = parseCSV(text);

      if (!rows || rows.length < 2) throw new Error("CSV 데이터가 비어있거나 헤더만 있습니다.");

      // 헤더 매핑 (한글 헤더 그대로)
      const header = rows[0].map(h => String(h).trim());
      const idx = (name) => header.indexOf(name);

      const required = ["거래일자","아파트명","법정동","전용면적(㎡)","층","거래금액(만원)","건축년도"];
      for (const r of required){
        if (idx(r) === -1) throw new Error(`필수 컬럼 누락: ${r}\n현재 헤더: ${header.join(", ")}`);
      }

      raw = rows.slice(1).map(cols => {
        const date = parseDateYMD(cols[idx("거래일자")]);
        const price = toNumber(cols[idx("거래금액(만원)")]);
        const area = toNumber(cols[idx("전용면적(㎡)")]);
        const floor = toNumber(cols[idx("층")]);
        const yearBuilt = toNumber(cols[idx("건축년도")]);

        return {
          거래일자_raw: cols[idx("거래일자")],
          거래일자: date,
          아파트명: (cols[idx("아파트명")] ?? "").trim(),
          법정동: (cols[idx("법정동")] ?? "").trim(),
          전용면적: area,
          층: floor,
          거래금액: price,
          건축년도: yearBuilt
        };
      }).filter(x => x.거래일자 && Number.isFinite(x.거래금액));

      if (raw.length === 0) throw new Error("유효한 (거래일자, 거래금액) 데이터가 없습니다.");

      // 최신순 정렬(기본)
      raw.sort((a,b) => b.거래일자 - a.거래일자);

      initFilters();
      applyFilters(); // 최초 렌더
    }catch(e){
      showError(String(e?.message || e));
      console.error(e);
    }
  }

  // ====== 필터 UI ======
  function initFilters(){
    const dongSelect = document.getElementById("dongSelect");
    const dongs = Array.from(new Set(raw.map(r => r.법정동).filter(Boolean))).sort((a,b)=>a.localeCompare(b,"ko"));
    // reset
    dongSelect.innerHTML = `<option value="">전체</option>`;
    for (const d of dongs){
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      dongSelect.appendChild(opt);
    }

    dongSelect.addEventListener("change", applyFilters);
    document.getElementById("aptSearch").addEventListener("input", debounce(applyFilters, 200));
    document.getElementById("resetBtn").addEventListener("click", () => {
      dongSelect.value = "";
      document.getElementById("aptSearch").value = "";
      applyFilters();
    });
  }

  function debounce(fn, ms){
    let t = null;
    return (...args) => {
      if (t) clearTimeout(t);
      t = setTimeout(()=>fn(...args), ms);
    };
  }

  // ====== 필터 적용 & 렌더 ======
  function applyFilters(){
    const dong = document.getElementById("dongSelect").value.trim();
    const aptQ = document.getElementById("aptSearch").value.trim().toLowerCase();

    filtered = raw.filter(r => {
      const okDong = dong ? r.법정동 === dong : true;
      const okApt = aptQ ? r.아파트명.toLowerCase().includes(aptQ) : true;
      return okDong && okApt;
    });

    renderKPIs();
    renderChart();
    renderTable();
  }

  function renderKPIs(){
    const cnt = filtered.length;
    document.getElementById("cnt").textContent = cnt.toLocaleString("ko-KR");

    if (cnt === 0){
      document.getElementById("avg").textContent = "-";
      document.getElementById("max").textContent = "-";
      document.getElementById("min").textContent = "-";
      document.getElementById("rangeHint").textContent = "-";
      document.getElementById("maxHint").textContent = "-";
      document.getElementById("minHint").textContent = "-";
      return;
    }

    const prices = filtered.map(r => r.거래금액).filter(Number.isFinite);
    const sum = prices.reduce((a,b)=>a+b,0);
    const avg = sum / prices.length;
    const max = Math.max(...prices);
    const min = Math.min(...prices);

    const newest = filtered[0].거래일자;                 // raw는 최신순 정렬
    const oldest = filtered[filtered.length-1].거래일자;

    document.getElementById("avg").textContent = fmtMoneyKRWMan(Math.round(avg));
    document.getElementById("max").textContent = fmtMoneyKRWMan(max);
    document.getElementById("min").textContent = fmtMoneyKRWMan(min);
    document.getElementById("rangeHint").textContent = `기간: ${fmtDate(oldest)} ~ ${fmtDate(newest)}`;

    const maxRow = filtered.find(r => r.거래금액 === max);
    const minRow = filtered.find(r => r.거래금액 === min);

    document.getElementById("maxHint").textContent =
      maxRow ? `${maxRow.아파트명} (${maxRow.법정동}) · ${fmtDate(maxRow.거래일자)}` : "-";
    document.getElementById("minHint").textContent =
      minRow ? `${minRow.아파트명} (${minRow.법정동}) · ${fmtDate(minRow.거래일자)}` : "-";
  }

  function renderChart(){
    // 월별 평균 계산
    const map = new Map(); // month -> {sum, cnt}
    for (const r of filtered){
      const k = monthKey(r.거래일자);
      const cur = map.get(k) || {sum:0, cnt:0};
      cur.sum += r.거래금액;
      cur.cnt += 1;
      map.set(k, cur);
    }

    const labels = Array.from(map.keys()).sort(); // YYYY-MM 정렬
    const data = labels.map(k => {
      const v = map.get(k);
      return Math.round(v.sum / v.cnt);
    });

    const ctx = document.getElementById("monthlyChart");
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "월별 평균 거래가격(만원)",
          data,
          tension: 0.25,
          fill: false,
          pointRadius: 3,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "#e6edf3" } },
          tooltip: {
            callbacks: {
              label: (ctx) => ` ${fmtMoneyKRWMan(ctx.parsed.y)} 만원`
            }
          }
        },
        scales: {
          x: { ticks: { color: "#9fb0c0" }, grid: { color: "rgba(30,42,59,0.5)" } },
          y: {
            ticks: {
              color: "#9fb0c0",
              callback: (v) => fmtMoneyKRWMan(v)
            },
            grid: { color: "rgba(30,42,59,0.5)" }
          }
        }
      }
    });
  }

  function renderTable(){
    const tbody = document.querySelector("#txTable tbody");
    tbody.innerHTML = "";

    for (const r of filtered){
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${fmtDate(r.거래일자)}</td>
        <td>${escapeHtml(r.아파트명)}</td>
        <td>${escapeHtml(r.법정동)}</td>
        <td style="text-align:right">${Number.isFinite(r.전용면적) ? r.전용면적.toFixed(2) : "-"}</td>
        <td style="text-align:right">${Number.isFinite(r.층) ? r.층 : "-"}</td>
        <td style="text-align:right">${fmtMoneyKRWMan(r.거래금액)}</td>
        <td style="text-align:right">${Number.isFinite(r.건축년도) ? r.건축년도 : "-"}</td>
      `;
      tbody.appendChild(tr);
    }

    // DataTables 재초기화
    if (dtTable){
      dtTable.destroy();
      dtTable = null;
    }

    dtTable = new DataTable("#txTable", {
      pageLength: 10,
      order: [[0, "desc"]],
      language: {
        search: "검색:",
        lengthMenu: "_MENU_ 개씩 보기",
        info: "총 _TOTAL_건 중 _START_~_END_",
        infoEmpty: "표시할 데이터가 없습니다",
        zeroRecords: "일치하는 결과가 없습니다",
        paginate: { first:"처음", last:"마지막", next:"다음", previous:"이전" }
      }
    });
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  // 시작
  load();
</script>
</body>
</html>
